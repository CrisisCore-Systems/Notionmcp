<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" fill="#F8FAFC"/>
  <text x="80" y="84" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#0F172A">Same Notion row, claimed, reviewed, enriched, and advanced</text>
  <text x="80" y="124" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569">Ready → In Progress → Needs Review → Packet Ready</text>

  <rect x="80" y="160" width="1240" height="92" rx="24" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="120" y="214" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1D4ED8">Default path: local MCP claims the next Ready row and reviewed write-back updates that same row</text>

  <rect x="80" y="300" width="340" height="440" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="3"/>
  <text x="110" y="350" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#0F172A">1. Notion row before</text>
  <text x="110" y="390" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569">The queue starts in Notion.</text>

  <rect x="110" y="430" width="280" height="260" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="138" y="478" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F172A">Name</text>
  <text x="138" y="510" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">AI meeting notes assistant</text>
  <text x="138" y="558" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F172A">Research Prompt</text>
  <text x="138" y="590" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Research the best launch</text>
  <text x="138" y="618" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">angle for product teams.</text>
  <text x="138" y="666" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F172A">Status</text>
  <rect x="228" y="639" width="116" height="40" rx="20" fill="#DCFCE7"/>
  <text x="258" y="665" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#166534">Ready</text>

  <rect x="530" y="300" width="340" height="440" rx="28" fill="#EFF6FF" stroke="#93C5FD" stroke-width="3"/>
  <text x="560" y="350" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1D4ED8">2. Durable research run</text>
  <text x="560" y="390" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1E40AF">Claim next Ready item via MCP</text>

  <rect x="560" y="430" width="280" height="82" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="584" y="468" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Row state</text>
  <text x="584" y="496" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">In Progress → Needs Review</text>

  <rect x="560" y="530" width="280" height="158" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="584" y="568" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Operational metadata</text>
  <text x="584" y="600" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#334155">Claimed By: Notion MCP Backlog Desk</text>
  <text x="584" y="628" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#334155">Claimed At: 2026-03-26 02:29 UTC</text>
  <text x="584" y="656" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#334155">Run ID: run_01HQ3Q9M2P</text>

  <text x="560" y="728" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1E40AF">planner / extractor / verifier stay behind the scenes</text>
  <text x="560" y="756" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1E40AF">The run survives disconnects and waits for approval.</text>

  <rect x="980" y="300" width="340" height="440" rx="28" fill="#F0FDF4" stroke="#86EFAC" stroke-width="3"/>
  <text x="1010" y="350" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#166534">3. Same row after</text>
  <text x="1010" y="390" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#15803D">Approved packet writes back to Notion</text>

  <rect x="1010" y="430" width="280" height="268" rx="20" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
  <text x="1038" y="470" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Status</text>
  <text x="1158" y="470" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#166534">Packet Ready</text>
  <text x="1038" y="510" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Research Summary</text>
  <text x="1038" y="538" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#334155">Best wedge: product teams that</text>
  <text x="1038" y="564" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#334155">already live in Slack + Notion.</text>
  <text x="1038" y="604" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Recommended Direction</text>
  <text x="1038" y="632" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#334155">Lead with searchable action items.</text>
  <text x="1038" y="672" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Competitors / Source Count</text>
  <text x="1038" y="700" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#334155">Otter, Granola, Fireflies / 12</text>

  <text x="1010" y="728" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#166534">Audit URL and run metadata stay inspectable afterward.</text>

  <path d="M430 520 L510 520" stroke="#64748B" stroke-width="8" stroke-linecap="round"/>
  <polygon points="498,504 530,520 498,536" fill="#64748B"/>
  <text x="436" y="486" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#334155">Claim</text>
  <text x="436" y="548" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#475569">Ready → In Progress</text>

  <path d="M870 520 L950 520" stroke="#64748B" stroke-width="8" stroke-linecap="round"/>
  <polygon points="938,504 970,520 938,536" fill="#64748B"/>
  <text x="874" y="486" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#334155">Review + write-back</text>
  <text x="874" y="548" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#475569">Needs Review → Packet Ready</text>
</svg>
